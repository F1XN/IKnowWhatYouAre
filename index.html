<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio desde 0</title>
<style>

body{
    background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:0;
    padding:60px;
}

h1{

    font-size:60px;
    animation: aparecer 1.5s ease;

}

p{
    font-size:22px;
}
.contenedor{
    max-width:700px;
    margin:auto;
    background:rgba(255,255,255,0.12);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
button{
    margin-top:20px;
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:12px;
    background:#4f8cff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2d6cdf;
}
@keyframes aparecer {

    from{
        opacity:0;
        transform:translateY(-30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}
</style>

</head>

<body>

 <div class="contenedor">

    <h1>Menor, nunca te rindas.</h1>

    <p>Bienvenido a mi primera página web.</p>

    <p>Todo esto fue creado desde mi Samsung A32 usando Termux y GitHub.</p>

    <button onclick="cambiarMensaje()">
    ¡Este es mi primer botón!
</button>

</div>

<script>

function cambiarMensaje(){

    document.querySelector("h1").innerText = "💙 Nunca dejes de aprender.";

    document.querySelector("p").innerText = "¡Acabas de ejecutar tu primer JavaScript!";

}

</script>

</body>

</html>
